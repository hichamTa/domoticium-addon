name: "Domoticium"
description: >
  Configure automatiquement Home Assistant pour Domoticium :
  installe Zigbee2MQTT, Matter Server (+ OTBR si install_thread_border_router
  activé) et Frigate NVR (go2rtc intégré pour les caméras), expose un serveur
  de commandes local (HA API, aucun token stocké côté cloud), puis tourne en
  service pont permanent (état → Supabase, commandes → HA locale).
  Supporte les coordinateurs USB et réseau PoE (SLZB-MR4U, SLZB-06…).
  À lancer une seule fois après la création du compte admin HA.
version: "2.3.5"
auto_update: true
slug: "domoticium"
init: false
arch:
  - aarch64
  - armv7
  - amd64
startup: "services"
boot: "auto"
host_network: true
hassio_api: true
hassio_role: manager
homeassistant_api: true
map:
  - homeassistant_config:rw
options:
  site_prefix: ""
  pi_username: ""
  pi_password: ""
  coordinator_host: ""
  coordinator_zigbee_port: 6638
  coordinator_thread_port: 7638
  zigbee_adapter: "auto"
  zigbee_adapter_type: "ember"
  install_thread_border_router: false
  thread_adapter: "auto"
  app_url: "https://app.domoticium.fr"
  cloudflare_tunnel_token: ""
  force_setup: false
  ingest_secret: ""
schema:
  site_prefix: str
  pi_username: str
  pi_password: str
  coordinator_host: str
  coordinator_zigbee_port: int
  coordinator_thread_port: int
  zigbee_adapter: str
  zigbee_adapter_type: "list(ember|zstack|zboss|deconz|zigate)"
  install_thread_border_router: bool
  thread_adapter: str
  app_url: str
  cloudflare_tunnel_token: str
  force_setup: bool
  ingest_secret: str
